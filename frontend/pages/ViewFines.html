<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View My Fines</title>
    <link rel="stylesheet" href="../css/styleviewfines.css">
    <style>
        .fines-container {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .fine-card {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #4facfe;
        }
        .fine-card p {
            margin: 4px 0;
            font-size: 13px;
        }
        .fine-card h3 {
            margin: 0 0 8px 0;
        }
        .status-unpaid {
            color: #ff6b6b;
            font-weight: bold;
        }
        .status-paid {
            color: #51cf66;
            font-weight: bold;
        }
        .download-btn {
            margin-top: 10px;
            padding: 8px 16px;
            background: linear-gradient(135deg, #4facfe, #00c6ff);
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 13px;
        }
        .download-btn:hover {
            opacity: 0.9;
        }
        .no-fines {
            text-align: center;
            color: gray;
            margin-top: 40px;
        }
        .loading {
            text-align: center;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">Drive Legal</div>
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <ul id="nav-links">
        <li><a href="RulesPage.html">Rules & Regulations</a></li>
        <li><a href="EmergencyContact.html">Emergency Contact</a></li>
        <li><a href="ViewFines.html">View my Fines</a></li>
        <li><a href="About.html">About</a></li>
        <li><a href="#" id="logoutBtn">log out</a></li>
    </ul>
</nav>

<div class="fines-container">
    <h2>📋 My Fines</h2>
    <p id="errormsg" style="color:red;"></p>
    <div id="loadingMsg" class="loading">Loading your fines...</div>
    <div id="finesDisplay"></div>
</div>

<script src="../js/api.js"></script>
<script src="../js/viewfines.js"></script>
</body>
</html>
