<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN LOGIN</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            width: 100%;
            max-width: 350px;
            border-radius: 12px;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.3);
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .login-box h2 {
            margin-bottom: 20px;
            color: white;
        }
        .input-box {
            margin-bottom: 15px;
            text-align: left;
        }
        .input-box label {
            display: block;
            margin-bottom: 5px;
            color: #ddd;
            font-size: 14px;
        }
        .input-box input {
            width: 100%;
            padding: 10px;
            border: none;
            outline: none;
            border-radius: 6px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #4facfe, #00c6ff);
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover { opacity: 0.9; }
        #back {
            position: absolute;
            top: 15px;
            left: 15px;
        }
        #back .btn {
            width: auto;
            padding: 8px 12px;
            font-size: 14px;
        }
        #errormsg {
            color: #ff6b6b;
            font-size: 13px;
            margin-bottom: 10px;
            min-height: 18px;
        }
        @media (max-width: 480px) {
            body { padding: 10px; align-items: flex-start; }
            .login-box { margin-top: 60px; padding: 20px; }
            .login-box h2 { font-size: 20px; }
            .btn { padding: 14px; font-size: 15px; }
        }
    </style>
</head>
<body>

<div id="back">
    <button class="btn" onclick="window.location.href='../index.html'">Back</button>
</div>

<div class="login-box">
    <h2>Admin Login</h2>
    <form id="adminLoginForm">
        <div class="input-box">
            <label>KEY</label>
            <input type="text" placeholder="Enter the provided key" id="key" required>
        </div>
        <div class="input-box">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password" required>
        </div>
        <p id="errormsg"></p>
        <button type="submit" class="btn">Login</button>
    </form>
</div>

<script src="../js/adminlogin.js"></script>
</body>
</html>
